<!doctype html>
<html lang="en" class="dark">
		<head>
			<meta charset="utf-8" />
			<meta name="viewport" content="width=device-width, initial-scale=1" />
			%sveltekit.head%
			<script>
				/* Polyfills for older Chromium (CEF) that lack ES2023 Array methods */
				if (!Array.prototype.findLast) {
					Array.prototype.findLast = function (fn, thisArg) {
						for (var i = this.length - 1; i >= 0; i--) {
							if (fn.call(thisArg, this[i], i, this)) return this[i];
						}
					};
				}
				if (!Array.prototype.findLastIndex) {
					Array.prototype.findLastIndex = function (fn, thisArg) {
						for (var i = this.length - 1; i >= 0; i--) {
							if (fn.call(thisArg, this[i], i, this)) return i;
						}
						return -1;
					};
				}
			</script>
			<script>
				(function () {
					function enableLegacyUiIfNeeded() {
						try {
							const probe = document.createElement('div');
							probe.className = 'flex';
							probe.style.position = 'absolute';
							probe.style.visibility = 'hidden';
							probe.style.pointerEvents = 'none';
							document.body.appendChild(probe);

							const hasTailwindUtilities = window.getComputedStyle(probe).display === 'flex';
							probe.remove();

							if (!hasTailwindUtilities) {
								document.documentElement.classList.add('legacy-ui');
							}
						} catch {
							document.documentElement.classList.add('legacy-ui');
						}
					}

					if (document.readyState === 'complete') {
						enableLegacyUiIfNeeded();
					} else {
						window.addEventListener('load', enableLegacyUiIfNeeded, { once: true });
					}
				})();
			</script>
		</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
